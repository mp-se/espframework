; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common_env_data]
platform = espressif8266 @ 4.2.1
; Arduino 2.x
platform32 = espressif32 @ 6.11.0
; Arduino 3.x
; platform32 = https://github.com/pioarduino/platform-espressif32#53.03.13
; upload_speed = 921600
upload_speed = 460800
monitor_speed = 115200
board_build.filesystem = littlefs
build_unflags = 
build_flags = 
	; Compiler and Arduino settings
	-Wl,-Map,output.map
	-D BAUD=${common_env_data.monitor_speed}
	-D USE_LITTLEFS=true
	-D CORE_DEBUG_LEVEL=6
	-D LOG_LEVEL=4

	; EspFramework Settings
	; -D PERF_INFLUX_TARGET=\""\""
	; -D PERF_INFLUX_BUCKET=\""\""
	; -D PERF_INFLUX_ORG=\""\""
	; -D PERF_INFLUX_TOKEN=\""\""
	; -D PERF_ENABLE
	-D MAX_SKETCH_SPACE=0x1c0000
	# Application Settings
	-D CFG_APPNAME="\"espfwk\""
	-D CFG_APPVER="\"1.2.0\""
	-D CFG_GITREV="\"\""
	
	; AsyncWebServer settings
	; -D CONFIG_ASYNC_TCP_MAX_ACK_TIME=3000
	; -D CONFIG_ASYNC_TCP_PRIORITY=10
	; -D CONFIG_ASYNC_TCP_QUEUE_SIZE=128
	-D CONFIG_ASYNC_TCP_RUNNING_CORE=1
	; -D CONFIG_ASYNC_TCP_STACK_SIZE=4096
	; -D WS_MAX_QUEUED_MESSAGES=64
	; -D ENABLE_ASYNCWEB_HTTP=1

	; PsychicHttp settings
	-D ESPFWK_PSYCHIC_HTTP=1
	-D ESPFWK_PSYCHIC_SSL=1

	; Feature flags (New 1.1)
	; -D ESPFWK_DISABLE_OTA=1
	; -D ESPFWK_DISABLE_MQTT=1
lib_deps = 
    https://github.com/bblanchon/ArduinoJson#v7.3.0
    https://github.com/256dpi/arduino-mqtt#v2.5.2
lib_deps8266 = 
	https://github.com/ESP32Async/ESPAsyncWebServer#v3.7.3
	https://github.com/esphome/ESPAsyncTCP#v2.0.0
lib_deps32 = 
	; https://github.com/ESP32Async/AsyncTCP#v3.3.7
	; https://github.com/ESP32Async/ESPAsyncWebServer#v3.7.3
	https://github.com/hoeken/PsychicHttp#1.2.1
html_files =
	html/index.html
	html/app.js.gz
	html/app.css.gz
	html/favicon.ico.gz

[env:unit]
upload_speed = ${common_env_data.upload_speed}
monitor_speed = ${common_env_data.monitor_speed}
framework = arduino
platform = ${common_env_data.platform}
build_unflags = ${common_env_data.build_unflags}
build_flags = 
	${common_env_data.build_flags}
	-D LOG_LEVEL=5
lib_deps = 
	https://github.com/bxparks/AUnit#v1.7.1
	${common_env_data.lib_deps}
	${common_env_data.lib_deps8266}
	ESP8266httpUpdate
	DNSServer
board = d1_mini
build_type = release
board_build.filesystem = littlefs
build_src_filter = +<*> -<demo-main*.cpp> +<../test/tests*.cpp>
monitor_filters = esp8266_exception_decoder

[env:esplib8266]
platform = ${common_env_data.platform}
board = d1_mini
framework = arduino
board_build.filesystem = ${common_env_data.board_build.filesystem}
upload_speed = ${common_env_data.upload_speed}
monitor_speed = ${common_env_data.monitor_speed}
build_unflags = 
	-D ESPFWK_USE_SERIAL_PINS=1
	${common_env_data.build_unflags}
build_flags = 
	${common_env_data.build_flags}
lib_deps = 
	${common_env_data.lib_deps}
	${common_env_data.lib_deps8266}
build_type = release
monitor_filters = esp8266_exception_decoder

[env:esplib32c3]
platform = ${common_env_data.platform32}
framework = arduino
board = lolin_c3_mini
board_build.filesystem = ${common_env_data.board_build.filesystem}
upload_speed = ${common_env_data.upload_speed}
monitor_speed = ${common_env_data.monitor_speed}
build_unflags = ${common_env_data.build_unflags}
build_flags = 
	-D ESP32C3=1
	-D ESPFWK_ENABLE_RGB_LED=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	${common_env_data.build_flags}
lib_deps = 
	${common_env_data.lib_deps}
	${common_env_data.lib_deps32}
build_type = release
board_build.partitions = partitions.csv
board_build.embed_txtfiles = ${common_env_data.html_files}
monitor_filters = esp32_exception_decoder

